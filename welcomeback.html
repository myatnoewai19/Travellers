<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Back</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-slate-00">
    <div
      class="m-auto mt-8 items-center font-sans bg-slate-400 flex flex-col max-w-md rounded-xl shadow-2xl"
    >
      <img
        src="image/lock.png"
        class="justify-center flex w-12 h-12 items-center text-center mt-5"
        alt=""
      />
      <h1 class="text-3xl font-semibold justify-center mt-3">Welcome Back</h1>
      <p>Enter your credentials to access your account.</p>
      <form class="jusify-center text-center px-3 rounded-lg">
        <div class="">
          <p class="font-semibold text-left">Email Address</p>
          <input
            type="text"
            id="add"
            placeholder="name@company.com"
            class="mt-2rounded-md px-3 w-full"
          />
        </div>

        <div class="mt-4">
          <p class="text-left font-semibold">Password</p>
          <input
            type="password"
            id="pw"
            placeholder="*******"
            class="mt-2 rounded-md w-full px-3"
          />
        </div>

        <div class="mt-3 text-sm">
          <input type="checkbox" id="ck" />
          Remember me
          <span class="text-blue-500 underline">Forgot password?</span>
        </div>
        <div class="mt-3">
          <button class="bg-blue-500 w-full font-semibold rounded-md">
            Log In →
          </button>
        </div>
      </form>
      <p>
        Don't have an account ?
        <span class="text-blue-500 underline">>Sign up for free free></span>
      </p>
    </div>
  </body>
</html>
