<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard</title>
</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static top-0 left-[-260px] md:left-0 z-50
      w-[240px] h-screen bg-slate-950 text-white
      flex flex-col justify-between
      transition-all duration-300">

            <div>

                <!-- Logo -->
                <div class="p-5 text-2xl font-bold border-b border-slate-800 flex justify-between items-center">
                    <span>📱 MobileShop</span>

                    <!-- Close Button -->
                    <button id="closeBtn" class="md:hidden text-3xl">
                        ✕
                    </button>
                </div>

                <!-- Menu -->
                <ul class="p-4 space-y-3">

                    <li class="bg-gradient-to-r from-pink-500 to-purple-600 p-3 rounded-lg cursor-pointer">
                        Dashboard
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Products
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Orders
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Users
                    </li>

                </ul>
            </div>

            <!-- Logout -->
            <div class="p-4">
                <button class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-lg">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Overlay -->         
        <div id="overlay"
            class="fixed inset-0 bg-black/30 backdrop-blur-sm pointer-events-none transition-all duration-300 -z-10 md:hidden">
        </div>

        <!-- Main -->
        <main class="flex-1  w-full">

            <!-- Topbar -->
            <div class="flex items-center mb-6 bg-white p-4 w-full shadow-sm">

                <!-- Mobile Menu Button -->
                <button id="menuBtn" class="md:hidden text-3xl">
                    ☰
                </button>

                <h1 class="text-3xl font-bold">
                    Dashboard
                </h1>
            </div>

            <!-- Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5  mx-5">

                <!-- Total Sales -->
                <div class="bg-white rounded-xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-green-200
      flex items-center justify-center text-2xl">
                        <img src="image/airplane.png" class="w-8 h-8" alt="">
                    </div>

                    <div>
                        <p class="text-gray-500">Total Sales</p>
                        <h2 class="text-3xl font-bold">$0.00</h2>
                    </div>

                </div>

                <!-- Orders -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-blue-200
      flex items-center justify-center text-2xl">
                       <img src="image/ap.jpg" class="w-8 h-8" alt="">
                    </div>

                    <div>
                        <p class="text-gray-500">Total Orders</p>
                        <h2 class="text-3xl font-bold">0</h2>
                    </div>

                </div>

                <!-- Customers -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-purple-200
      flex items-center justify-center text-2xl">
                       <img src="image/local.png" class="w-8 h-8" alt="">
                    </div>

                    <div>
                        <p class="text-gray-500">Customers</p>
                        <h2 class="text-3xl font-bold">1</h2>
                    </div>

                </div>

                <!-- Low Stock -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-red-200
      flex items-center justify-center text-2xl">
                        <img src="image/wheel.png" class="w-8 h-8" alt="">
                    </div>

                    <div>
                        <p class="text-gray-500">Low Stock Items</p>
                        <h2 class="text-3xl font-bold">0</h2>
                    </div>

                </div>

            </div>


            <!-- Table -->
            <div class="bg-white rounded-2xl mt-7 mx-5 overflow-x-auto shadow-sm">

                <div class="flex justify-between items-center p-4 border-b">
                    <h2 class="text-xl font-semibold">
                        Recent Orders
                    </h2>

                    <span class="text-pink-500 cursor-pointer">
                        View all
                    </span>
                </div>

                <table class="w-full min-w-[600px]">

                    <thead>
                        <tr class="text-left text-gray-500">

                            <th class="p-5">ORDER ID</th>
                            <th class="p-5">CUSTOMER</th>
                            <th class="p-5">DATE</th>
                            <th class="p-5">TOTAL</th>
                            <th class="p-5">STATUS</th>

                        </tr>
                    </thead>

                </table>

            </div>

    </div>

    </main>

    </div>

    <script>
        const menuBtn = document.getElementById("menuBtn");
        const closeBtn = document.getElementById("closeBtn");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        function openSidebar() {
            sidebar.classList.remove("left-[-260px]");
            sidebar.classList.add("left-0");
            overlay.classList.remove("-z-10", "pointer-events-none");
            overlay.classList.add("z-40");
            menuBtn.innerHTML = "✕";
        }

        function closeSidebar() {
            sidebar.classList.remove("left-0");
            sidebar.classList.add("left-[-260px]");
            overlay.classList.remove("z-40");
            overlay.classList.add("-z-10", "pointer-events-none");
            menuBtn.innerHTML = "☰";
        }

        menuBtn.addEventListener("click", () => {
            if (sidebar.classList.contains("left-0")) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        closeBtn.addEventListener("click", closeSidebar);
        overlay.addEventListener("click", closeSidebar);
    </script>

</body>

</html>
