<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">
    <div class="m-auto mt-8 items-center font-sans bg-slate-400 flex flex-col gap-4 w-[450px] max-w-full px-5 rounded-xl shadow-2xl py-6">
    
        <img src="image/profile.png" 
        class="justify-center flex w-14 h-14 bg-slate-100 items-center border rounded-lg text-center" alt="" />
        <h1 class="text-3xl font-bold  justify-center">Create Account</h1>
        <p>Join us today! It only takes a minute.</p>
        <form class=" jusify-center text-center px-8 rounded-lg">
            <div class="gap-4 grid grid-cols-2 mt-3 rounded-md">
                <div class="">
                    <p class="font-bold text-left">Full Name</p>
                    <input type="text" id="name" placeholder="John Doe" class=" mt-2 h-8 rounded-md px-3 w-full"/>
                </div>
                <div class="">
                    <p class="font-bold text-left ">Email Address</p>
                    <input type="text" id="add" placeholder="name@company.com" class="mt-2 h-8 rounded-md px-3 w-full" />
                </div>
            </div>

            <div class=" mt-4">
                <p class="text-left font-bold ">Password</p>
                <input type="password" id="pw" placeholder="*******" class="mt-2 h-8 rounded-md w-full px-3" />
            </div>
            <div class="mt-4">
                <p class="text-left font-bold">Confirm Password</p>
                <input type="password" id="pwc" placeholder="*******" class="mt-2 h-8 rounded-md w-full px-3" />
            </div>
            <div class="mt-3 text-sm">
                <input type="checkbox" id="ck" />
                I agree to the <span class="text-blue-800 underline">Terms of Service</span> and <span class="text-blue-800 underline">Privacy Policy</span>.
            </div>
            <div class="mt-3">
                <button class="bg-blue-600 w-full h-8 font-bold rounded-md">Create My Account >></button>
            </div>
        </form>
        <p>Already have an account? <span class="text-blue-800 underline"><a href="index.html">Sign in here</a></span></p>
    </div>
</body>

</html>
